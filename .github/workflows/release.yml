name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install Wails CLI
      run: |
        go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
    
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Build for ${{ matrix.platform }}
      run: |
        wails build -platform ${{ matrix.platform }} -clean
    
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: nook-${{ matrix.platform }}
        path: build/bin/

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [windows/amd64, windows/arm64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install Wails CLI
      run: |
        go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
    
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Build for ${{ matrix.platform }}
      run: |
        wails build -platform ${{ matrix.platform }} -clean -nsis
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: nook-${{ matrix.platform }}
        path: build/bin/

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        platform: [darwin/amd64, darwin/arm64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install Wails CLI
      run: |
        go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
    
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Build for ${{ matrix.platform }}
      run: |
        wails build -platform ${{ matrix.platform }} -clean
    
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: nook-${{ matrix.platform }}
        path: build/bin/

  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: List artifacts
      run: find artifacts -type f
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          artifacts/**/*