name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
    
    - name: Run frontend tests
      working-directory: ./frontend
      run: npm test
    
    - name: Run Go tests
      run: go test ./backend/...
    
    - name: Check TypeScript compilation
      working-directory: ./frontend
      run: npx tsc --noEmit
    
  build-linux:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build wails (amd64)
      uses: snider/build/actions/build/wails2@v3
      with:
        build-name: nook
        build-platform: linux/amd64
        package: false
        go-version: '1.23'
    
    - name: Build wails (arm64)
      uses: snider/build/actions/build/wails2@v3
      with:
        build-name: nook
        build-platform: linux/arm64
        package: false
        go-version: '1.23'
    
    - name: List build artifacts
      run: ls -la build/bin/
